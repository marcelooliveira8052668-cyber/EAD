  /* Importação de fonte moderna */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #f8fafc;
    color: #1e293b;
    line-height: 1.6;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 700px;
    width: 100%;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  header h1 { color: #0f172a; margin-bottom: 5px; }

  header p { 
    background: #e2e8f0; 
    display: inline-block; 
    padding: 4px 12px; 
    border-radius: 20px; 
    font-size: 0.85rem; 
    font-weight: 600;
  }

  .pergunta-box {
    background: #ffffff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    margin-bottom: 25px;
    border-left: 6px solid #3b82f6;
  }

  .pergunta-box p { font-size: 1.15rem; font-weight: 500; }

  .opcoes { display: flex; flex-direction: column; gap: 15px; }

  .opcao-btn {
    background: #ffffff;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    text-align: left;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 15px;
    width: 100%;
  }

  .opcao-btn:hover:not(:disabled) {
    border-color: #3b82f6;
    background-color: #eff6ff;
  }

  .opcao-btn .letra {
    background: #f1f5f9;
    color: #64748b;
    font-weight: 700;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .btn-voltar {
    display: block;
    text-align: center;
    margin-top: 30px;
    color: #64748b;
    text-decoration: none;
    font-weight: 600;
  }

      // Variáveis de controle de jogo
      let questaoAtual = 0;
      let pontuacao = 0;

      // Capturando os elementos da tela para atualizar via script
      const txtContador = document.querySelector("header p");
      const txtEnunciado = document.getElementById("enunciado");
      const boxOpcoes = document.getElementById("container-opcoes");

      // 2. FUNÇÃO QUE MONTA A QUESTÃO NA TELA
      function carregarQuestao() {
        const q = bancoQuestoes[questaoAtual];

        // Atualiza o contador do topo e o enunciado
        txtContador.innerText = `Questão ${questaoAtual + 1} de ${bancoQuestoes.length} — ${q.disciplina}`;
        txtEnunciado.innerHTML = `<strong>(${q.disciplina})</strong> ${q.enunciado}`;

        // Limpa o que tinha antes na caixa de opções
        boxOpcoes.innerHTML = "";

        const letras = ["A", "B", "C", "D", "E"];

        // Cria um botão para cada alternativa
        q.alternativas.forEach((alternativa, indice) => {
          const botao = document.createElement("button");
          botao.classList.add("opcao-btn");
          botao.innerHTML = `<span class="letra">${letras[indice]}</span> <span class="texto-alt">${alternativa}</span>`;

          // Configura para chamar a validação quando o aluno clicar
          botao.addEventListener("click", () =>
            verificarResposta(indice, botao),
          );

          boxOpcoes.appendChild(botao);
        });
      }

      // 3. FUNÇÃO QUE CHECA SE O ALUNO ACERTOU OU ERROU
      function verificarResposta(indiceSelecionado, botaoClicado) {
        const q = bancoQuestoes[questaoAtual];
        const todosBotoes = document.querySelectorAll(".opcao-btn");

        // Desativa todos os botões para o aluno não clicar em mais de um
        todosBotoes.forEach((btn) => (btn.disabled = true));

        if (indiceSelecionado === q.correta) {
          // Se acertou: o botão fica verde
          botaoClicado.style.backgroundColor = "#2ecc71";
          botaoClicado.style.color = "#ffffff";
          botaoClicado.style.borderColor = "#2ecc71";
          botaoClicado.querySelector(".letra").style.backgroundColor =
            "#27ae60";
          botaoClicado.querySelector(".letra").style.color = "#ffffff";
          pontuacao++;
        } else {
          // Se errou: o botão clicado fica vermelho
          botaoClicado.style.backgroundColor = "#e74c3c";
          botaoClicado.style.color = "#ffffff";
          botaoClicado.style.borderColor = "#e74c3c";
          botaoClicado.querySelector(".letra").style.backgroundColor =
            "#c0392b";
          botaoClicado.querySelector(".letra").style.color = "#ffffff";

          // E o botão correto acende em verde para ensinar o aluno
          const botaoCerto = todosBotoes[q.correta];
          botaoCerto.style.backgroundColor = "#2ecc71";
          botaoCerto.style.color = "#ffffff";
          botaoCerto.style.borderColor = "#2ecc71";
          botaoCerto.querySelector(".letra").style.backgroundColor = "#27ae60";
          botaoCerto.querySelector(".letra").style.color = "#ffffff";
        }

        // Aguarda 1.5 segundos e mostra o botão para avançar
        setTimeout(() => {
          const btnProxima = document.createElement("button");
          btnProxima.innerText =
            questaoAtual < bancoQuestoes.length - 1
              ? "Próxima Questão ➡️"
              : "Ver Resultado Final 🏆";
          btnProxima.style.cssText =
            "background:#34495e; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-top:10px; cursor:pointer; width:100%; font-size:1rem;";

          btnProxima.addEventListener("click", () => {
            questaoAtual++;
            if (questaoAtual < bancoQuestoes.length) {
              carregarQuestao();
            } else {
              exibirResultadoFinal();
            }
          });
          boxOpcoes.appendChild(btnProxima);
        }, 1500);
      }

      // 4. FUNÇÃO QUE MOSTRA O PLACAR FINAL
      function exibirResultadoFinal() {
        txtContador.innerText = "Simulado Finalizado!";
        txtEnunciado.innerHTML = `<h3>Fim da linha! Veja o seu desempenho:</h3>`;

        let feedbackTexto = "";
        if (pontuacao === bancoQuestoes.length) {
          feedbackTexto =
            "Incrível! Você gabaritou o simulado completo! Desempenho fantástico Nota 1000! 🔥";
        } else if (pontuacao >= bancoQuestoes.length / 2) {
          feedbackTexto =
            "Muito bom! Você acertou a maior parte das questões e está no caminho certo para o ENEM! 🚀";
        } else {
          feedbackTexto =
            "Não desanime! Revise os pontos em que teve dúvida utilizando as páginas de teoria e tente de novo. 💪";
        }

        boxOpcoes.innerHTML = `
                <div style="text-align:center; padding: 25px; background:#e8f4f8; border-radius:8px; border: 1px solid #d4e6f1;">
                    <p style="font-size:1.6rem; margin-bottom:10px; color:#2980b9;">Você acertou <strong>${pontuacao}</strong> de <strong>${bancoQuestoes.length}</strong>!</p>
                    <p style="color:#555; line-height:1.4;">${feedbackTexto}</p>
                </div>
                <button onclick="window.location.reload()" style="background:#2ecc71; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-top:15px; cursor:pointer; font-size:1rem;">Refazer Simulado</button>
            `;
      }

      // Dá o pontapé inicial e roda o simulado assim que a página abre
      carregarQuestao();
    </script>
