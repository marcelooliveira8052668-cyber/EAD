<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Estudos ENEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #2980b9;
        --secondary: #e67e22;
        --bg: #f4f7f6;
        --text: #2c3e50;
      }
      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
      }
      header {
        background: linear-gradient(135deg, var(--primary), #3498db);
        color: white;
        padding: 3rem 1rem;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        margin: 0;
        font-family: "Montserrat", sans-serif;
        letter-spacing: 2px;
      }

      .busca-container {
        text-align: center;
        padding: 30px;
      }
      #filtro {
        padding: 15px 25px;
        width: 80%;
        max-width: 500px;
        border-radius: 50px;
        border: 2px solid #ddd;
        outline: none;
        transition: 0.3s;
      }
      #filtro:focus {
        border-color: var(--secondary);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 20px;
        max-width: 1100px;
        margin: auto;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        transition: 0.3s;
        border-top: 5px solid var(--primary);
      }
      .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      }

      button {
        background: var(--secondary);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        margin: 5px;
        transition: 0.3s;
      }
      button:hover {
        background: #d35400;
      }
      .btn-pdf {
        background: #27ae60;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 8px;
        color: white;
        display: inline-block;
        font-weight: 600;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 15px;
        width: 90%;
        max-width: 700px;
      }
      
      
    </style>
  </head>
  <body>
    
    <header>
      <h1>Portal de Estudos ENEM 2026</h1>
      <p>Prepare-se para o seu futuro com foco total!</p>
    </header>

    <div class="busca-container">
      <input
        type="text"
        id="filtro"
        placeholder="🔍 Pesquisar disciplina..."
        onkeyup="filtrar()"
      />
    </div>

    <section class="grid" id="grid-cursos"></section>

    <div id="modal-curso" class="modal">
      <div class="modal-content">
        <span
          onclick="fecharModal()"
          style="
            cursor: pointer;
            float: right;
            font-weight: bold;
            font-size: 1.2rem;
          "
          >FECHAR ✕</span
        >
        <h2
          id="modal-titulo"
          style="text-align: center; color: var(--primary)"
        ></h2>
        <div id="video-container" style="text-align: center"></div>
      </div>
    </div>

        {

        {

        },
        {
          titulo: "Química",

          pdf: "Resumao-de-Quimica-no-ENEM-Mapas-Conceituais-Exercicios-e-Dicas-Praticas.pdf",
        },
        {
          titulo: "Filosofia",

        {

          pdf: "#",
        },
      ];

      function renderizar(lista) {
        const grid = document.getElementById("grid-cursos");
        grid.innerHTML = lista
          .map(
            (c) => `
                <div class="card">
                    <h3>${c.titulo}</h3>
                    <button onclick="acessar('${c.titulo}','${c.video}')">Assista à Aula</button>
                    <a href="${c.pdf}" class="btn-pdf" target="_blank">Baixar PDF</a>
                </div>
            `,
          )
          .join("");
      }

      function filtrar() {
        const termo = document.getElementById("filtro").value.toLowerCase();
        renderizar(
          cursos.filter((c) => c.titulo.toLowerCase().includes(termo)),
        );
      }

      function acessar(titulo, url) {
        document.getElementById("modal-titulo").innerText = titulo;
        document.getElementById("video-container").innerHTML =
          `<div style="padding-bottom:56.25%; position:relative; display:block; width: 100%"><iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" src="${url}" frameborder="0" allowfullscreen></iframe></div>`;
        document.getElementById("modal-curso").style.display = "flex";
      }

      function fecharModal() {
        document.getElementById("modal-curso").style.display = "none";
        document.getElementById("video-container").innerHTML = "";
      }
